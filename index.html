  <style>
    /* Premium Font Variables */
    :root {
      --font-serif: 'Playfair Display', serif;
      --font-sans: 'Inter', sans-serif;
    }

    /* Apply base typography & Apple/Mac rendering optimization */
    body {
      font-family: var(--font-sans);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
      background-color: #fafafa;
      /* Prevents white flash before load */
      color: #1c1917;
      /* stone-900 */
    }

    /* Force Tailwind serif classes to use our gorgeous Playfair Display */
    .font-serif {
      font-family: var(--font-serif) !important;
    }

    /* ==========================================
       CUSTOM TEXT SELECTION (High-End Polish)
       ========================================== */
    /* Light Mode Highlight */
    ::selection {
      background-color: #f59e0b;
      /* Amber 500 */
      color: #fff;
    }

    ::-moz-selection {
      background-color: #f59e0b;
      color: #fff;
    }

    /* Dark Mode specific base styles */
    @media (prefers-color-scheme: dark) {
      body {
        background-color: #050505;
        color: #fafaf9;
        /* stone-50 */
      }
    }

    html.dark ::selection {
      background-color: #f59e0b;
      /* Amber 500 */
      color: #050505;
      /* Deep black text for contrast */
    }

    html.dark ::-moz-selection {
      background-color: #f59e0b;
      color: #050505;
    }
  </style>
</head>
